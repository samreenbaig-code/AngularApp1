<div [class.dark]="darkMode">

  <button (click)="toggleDarkMode()">
    Toggle Dark Mode
  </button>

  <h1>User Profile Dashboard</h1>

  <app-user-card [user]="user"></app-user-card>

  <app-user-status
    [isOnline]="user.isOnline"
    (statusToggled)="toggleStatus()">
  </app-user-status>

  <app-user-bio
    [bio]="user.bio"
    (bioUpdated)="updateBio($event)">
  </app-user-bio>

</div>
